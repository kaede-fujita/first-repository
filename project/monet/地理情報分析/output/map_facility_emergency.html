  const map = L.map('map').setView([35.96064308333333, 140.6298684111111], 9);

    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'

  function radius(v) {
    if (!maxVal || v <= 0) return 5;
    return 5 + 14 * Math.sqrt(v / maxVal);
  }

  data.forEach((r) => {
    const v = Number(r['救急車の受入件数（年間）']) || 0;
    L.circleMarker([r.緯度, r.経度], {
      radius: radius(v),
      color: '#9b2226',
      fillColor: '#ee9b00',
      fillOpacity: 0.75,
      weight: 1
    }).bindPopup(
